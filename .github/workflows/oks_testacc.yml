name: OKS - Acceptance Tests

on:
    pull_request:
        branches:
            - main
        paths:
            - ".github/workflows/oks_testacc.yml"
            - ".github/workflows/reusable_acceptance_test.yml"
            - "internal/services/oks/**"
            - "internal/client/**"
            - "internal/testacc/**"
            - "internal/fwhelpers/**"
            - "internal/fwmodifyplan/**"
            - "internal/fwvalidators/**"
            - "internal/utils/**"
            - "provider/**"
            - "go.sum"
            - "go.mod"
            - "GNUmakefile"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    oks-tests:
        uses: ./.github/workflows/reusable_acceptance_test.yml
        with:
            test-command: testacc-oks
            region: eu-west-2
            service: oks
            providers: outscale_oks
        secrets: inherit
