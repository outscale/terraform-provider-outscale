name: All Acceptance Tests

on:
    push:
        branches:
            - master
        paths:
            - "CHANGELOG.md"
    schedule:
        # Run daily at 2 AM UTC
        - cron: "0 2 * * *"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    oapi-nets-tests:
        uses: ./.github/workflows/reusable_acceptance_test.yml
        with:
            test-command: testacc-oapi-net
            region: us-east-2
            service: oapi
            providers: outscale_oapi,outscale_oos
        secrets: inherit

    oapi-vms-tests:
        uses: ./.github/workflows/reusable_acceptance_test.yml
        with:
            test-command: testacc-oapi-vm
            region: eu-west-2
            service: oapi
            providers: outscale_oapi,outscale_oos
        secrets: inherit

    oapi-others-tests:
        uses: ./.github/workflows/reusable_acceptance_test.yml
        with:
            test-command: testacc-oapi-others
            region: eu-west-2
            service: oapi
            providers: outscale_oapi,outscale_oos
        secrets: inherit

    oks-tests:
        uses: ./.github/workflows/reusable_acceptance_test.yml
        with:
            test-command: testacc-oks
            region: eu-west-2
            service: oks
            providers: outscale_oks
        secrets: inherit

    provider-tests:
        uses: ./.github/workflows/reusable_acceptance_test.yml
        with:
            test-command: testacc-provider
            region: eu-west-2
            service: oapi
            providers: outscale_oapi
        secrets: inherit
