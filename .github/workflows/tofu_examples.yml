name: Examples tofu tests

on:
    pull_request:
        branches:
            - master
        paths:
            - "examples/**.tfvars"
            - "examples/**.tf"
            - "scripts/test-examples.sh"
            - "GNUmakefile"
            - ".github/workflows/tofu_examples.yml"
    schedule:
        - cron: "30 22 * * *"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    examples-tofu-tests:
        environment: test-eu-west-2
        runs-on: [self-hosted, linux, eu-west-2, oapi]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: outscale/frieza-github-actions/frieza-clean@68ffd39d7e181f3548369e332242b329b04a3182 # master
              with:
                  access_key: ${{ secrets.OSC_ACCESS_KEY }}
                  secret_key: ${{ secrets.OSC_SECRET_KEY }}
                  region: ${{ secrets.OSC_REGION }}
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: "./go.mod"
            - name: Setup OpenTofu
              uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
              with:
                  tofu_wrapper: false
            - name: Run Examples
              run: make tofu-examples
              env:
                  TF_VAR_access_key_id: ${{ secrets.OSC_ACCESS_KEY }}
                  TF_VAR_secret_key_id: ${{ secrets.OSC_SECRET_KEY }}
                  TF_VAR_region: ${{ secrets.OSC_REGION }}
                  TF_VAR_image_id: ${{ secrets.OSC_OMI_EXEMPLE }}
