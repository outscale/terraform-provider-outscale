name: Reusable Acceptance Test

on:
    workflow_call:
        inputs:
            test-command:
                required: true
                type: string
            region:
                required: true
                type: string
            service:
                required: true
                type: string
            providers:
                required: true
                type: string

permissions:
    contents: read

jobs:
    acceptance-test:
        environment: test-${{ inputs.region }}
        runs-on:
            - self-hosted
            - linux
            - ${{ inputs.region }}
            - ${{ inputs.service }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: outscale/frieza-github-actions/frieza-clean@1d8b83bc64d2230a0c3bc9f018ba6c0c67df98e8 # v0.15.0-hotfix.0
              with:
                  access_key: ${{ secrets.OSC_ACCESS_KEY }}
                  secret_key: ${{ secrets.OSC_SECRET_KEY }}
                  region: ${{ secrets.OSC_REGION }}
                  providers: ${{ inputs.providers }}
            - name: Set up Go
              uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
              with:
                  go-version-file: "./go.mod"
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
              with:
                  terraform_version: 1.14.3
                  terraform_wrapper: false
            - name: Build go test
              run: make test
              env:
                  OUTSCALE_ACCESSKEYID: ${{ secrets.OSC_ACCESS_KEY }}
                  OUTSCALE_SECRETKEYID: ${{ secrets.OSC_SECRET_KEY }}
                  OUTSCALE_REGION: ${{ secrets.OSC_REGION }}
                  OUTSCALE_ACCOUNT: ${{ secrets.OSC_ACCOUNT_ID }}
                  OUTSCALE_IMAGEID: ${{ secrets.OUTSCALE_IMAGEID }}
                  OSC_ACCESS_KEY: ${{ secrets.OSC_ACCESS_KEY }}
                  OSC_SECRET_KEY: ${{ secrets.OSC_SECRET_KEY }}
                  OSC_REGION: ${{ secrets.OSC_REGION }}
            - name: Run acceptance tests
              run: make ${{ inputs.test-command }}
              env:
                  OUTSCALE_ACCESSKEYID: ${{ secrets.OSC_ACCESS_KEY }}
                  OUTSCALE_SECRETKEYID: ${{ secrets.OSC_SECRET_KEY }}
                  OUTSCALE_REGION: ${{ secrets.OSC_REGION }}
                  OUTSCALE_ACCOUNT: ${{ secrets.OSC_ACCOUNT_ID }}
                  OUTSCALE_IMAGEID: ${{ secrets.OUTSCALE_IMAGEID }}
                  OSC_ACCESS_KEY: ${{ secrets.OSC_ACCESS_KEY }}
                  OSC_SECRET_KEY: ${{ secrets.OSC_SECRET_KEY }}
                  OSC_REGION: ${{ secrets.OSC_REGION }}
