name: Check build & lint

on:
  pull_request:
    branches: [master]
    paths:
      - "**.go"
      - "go.*"
      - "GNUMakefile"
      - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: ⬇️ Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "./go.mod"
      - name: 🔎 golangci-lint
        uses: outscale/goutils/.github/actions/lint@05ad7817324ae08f446039cbe11ed0322ae2467b # main
      - name: 🔎 Run make build
        run: make build
        shell: bash
