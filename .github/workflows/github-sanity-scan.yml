name: Github sanity scanner

on:
    pull_request:
        branches: [master]

permissions:
    contents: read

jobs:
    github-sanity-scan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - name: Github sanity scanner
              uses: outscale/github-sanity-scan@main
              with:
                  no-pull-request-target: true
