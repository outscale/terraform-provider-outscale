name: All Integration Tests

on:
    schedule:
        # Run daily at 2 AM UTC
        - cron: "0 2 * * *"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    oapi-nets-integration-tests:
        uses: ./.github/workflows/reusable_integration_test.yml
        with:
            test-command: test-integration-oapi-nets
            region: us-east-2
            service: oapi
            providers: outscale_oapi,outscale_oos
        secrets: inherit

    oapi-integration-tests:
        uses: ./.github/workflows/reusable_integration_test.yml
        with:
            test-command: test-integration-oapi
            region: eu-west-2
            service: oapi
            providers: outscale_oapi,outscale_oos
        secrets: inherit

    oks-integration-tests:
        uses: ./.github/workflows/reusable_integration_test.yml
        with:
            test-command: test-integration-oks
            region: eu-west-2
            service: oks
            providers: outscale_oks
        secrets: inherit
