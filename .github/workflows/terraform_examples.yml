name: Examples terraform tests

on:
    pull_request:
        branches:
            - master
        paths:
            - "examples/**.tfvars"
            - "examples/**.tf"
            - "scripts/test-examples.sh"
            - "GNUmakefile"
            - ".github/workflows/terraform_examples.yml"
    schedule:
        - cron: "30 22 * * *"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    example-terraform-tests:
        environment: test-eu-west-2
        runs-on: [self-hosted, linux, eu-west-2, oapi]
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: "./go.mod"
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
              with:
                  terraform_wrapper: false
            - name: Verify Examples
              run: make terraform-examples
              env:
                  TF_VAR_access_key_id: ${{ secrets.OSC_ACCESS_KEY }}
                  TF_VAR_secret_key_id: ${{ secrets.OSC_SECRET_KEY }}
                  TF_VAR_region: ${{ secrets.OSC_REGION }}
                  TF_VAR_image_id: ${{ secrets.OSC_OMI_EXEMPLE }}
